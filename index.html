<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balloutt Trades</title>
  <meta name="description" content="Balloutt Trades LLC — Top 0.1% trader results." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230d0131'/%3E%3Cg stroke='%23a855f7' stroke-width='8' stroke-linecap='round'%3E%3Cline x1='30' y1='68' x2='30' y2='32'/%3E%3Cline x1='50' y1='78' x2='50' y2='46'/%3E%3Cline x1='70' y1='58' x2='70' y2='22'/%3E%3C/g%3E%3Ccircle cx='38' cy='44' r='5' fill='%23ff3b4e'/%3E%3Ccircle cx='62' cy='44' r='5' fill='%23ff3b4e'/%3E%3C/svg%3E" />
</head>
<body>

  <main class="wrap">
    <header class="id">
      <div class="avatar">
        <img src="assets/profile.jpg" alt="Balloutt Trades" />
      </div>
      <h1 class="name">Balloutt <em>Trades</em></h1>
      <p class="bio" id="bio">Loading...</p>
      <div class="links" id="links"></div>
    </header>
  </main>

  <script>
    fetch('config.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('bio').textContent = data.bio;
        const container = document.getElementById('links');
        data.links.forEach(link => {
          const a = document.createElement('a');
          a.href = link.url;
          a.className = 'link';
          a.target = '_blank';
          a.textContent = link.label;
          container.appendChild(a);
        });
      });
  </script>

</body>
</html>
